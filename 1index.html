<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <title>Forulário</title>
</head>
<body>
    <form action="#" method="post" class="Cadastro">
        <h1>Formulário</h1>
        <header>Preencha seu perfil</header>
        <div class="campo">
            <label for="nome" class="rotulo">Nome Completo:</label>
            <input type="text" id="nome" name="nome" class="entrada-texto">
        </div>
        <div class="campo">
            <label for="idade" class="rotulo">Idade:</label>
            <input type="nuber" class="idade" name="idade" class="entrada-número">
        </div>
        <div class="campo">
            <label for="endereço" class="rotulo">Endereço</label>
            <input type="text" id="endereço" name="endereço" class="entrada-texto">
        </div>
        <div class="campo">
            <label for="telefone" class="rotulo">Telefone:</label>
            <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" class="entrada-tel">
        </div>
          <div class="campo1">
            <label class="rotulo1">Sexo:</label>
            <div class="opcao-item">
                <input type="radio" id="masc" name="sexo" class="radio-input">
                <label for="masc">Masculino</label>
            </div>
            <div class="opcao-item">
                <input type="radio" id="fem" name="sexo" class="radio-input">
                <label for="fem">Feminino</label>
            </div>
            <div class="opcao-item">
                <input type="radio" id="outro" name="sexo" class="radio-input">
                <label for="outro">Outro</label>
            </div>

        <div class="campo">
            <label for="Especifique nesta área" class="rotulo">Especifique nesta área:</label>
            <input type="text" id="Especifique nesta área" name="Especifique nesta área" class="entrada-texto">
        </div>
          <div class="campo1">
            <label class="rotulo1">Série/ano que estuda:</label>
            <div class="opcao-item">
                <input type="radio" id="1°ano" name="Série/ano que estuda:" class="radio-input">
                <label for="1°ano">1°ano</label>
            </div>
            <div class="opcao-item">
                <input type="radio" id="2°ano" name="Série/ano que estuda:" class="radio-input">
                <label for="2°ano">2°ano</label>
            </div>
            <div class="opcao-item">
                <input type="radio" id="3°ano" name="Série/ano que estuda:" class="radio-input">
                <label for="3°ano">3°ano</label>
            </div>

            <div class="campo">
                <label for="data de nascimento" class="rotulo">Data de nascimento</label>
                <input type="date" id="data de nascimento" name="data de nascimento" class="entrada-date">
            </div>
            <div class="campo">
                <button type="button" for="Finalizar o cadastro" class="rotulo">Finalizar o cadastro</button>
            </div>
        </form>
    
</body>
</html>
